name: LintAndTest

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true
    - name: Flutter Pub Get
      run: flutter pub get
    - name: Format diff check
      run: |
        flutter format --set-exit-if-changed .
    - name: Run unit tests
      run: flutter test
