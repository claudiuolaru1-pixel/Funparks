name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_android:
    name: Android AAB
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Flutter version
      run: flutter --version

    - name: Install dependencies
      run: flutter pub get

    - name: Generate localization
      run: flutter gen-l10n

    - name: Generate icons
      run: dart run flutter_launcher_icons

    - name: Generate splash
    - name: Decode Android keystore
      if: runner.os == 'Linux'
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
          echo "No keystore secret set; building unsigned."
          exit 0
        fi
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/keystore.jks

    - name: Create key.properties
      if: runner.os == 'Linux'
      env:
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        mkdir -p android
        cat > android/key.properties <<EOF
        storePassword=${ANDROID_KEYSTORE_PASSWORD}
        keyPassword=${ANDROID_KEY_PASSWORD}
        keyAlias=${ANDROID_KEY_ALIAS}
        storeFile=keystore.jks
        EOF

    - name: Patch Gradle signing config (if needed)
      if: runner.os == 'Linux'
      run: |
        FILE=android/app/build.gradle
        if [ -f "$FILE" ]; then
          echo "build.gradle exists; ensure it reads key.properties."
        else
          echo "Note: android/app/build.gradle not found in repo. Make sure to run 'flutter create .' locally and commit android/ios folders for CI builds."
        fi

      run: dart run flutter_native_splash:create

    - name: Analyze
      run: flutter analyze

    - name: Build appbundle
      run: flutter build appbundle --release
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: funparks-android-aab
        path: build/app/outputs/bundle/release/*.aab


  build_ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Flutter version
      run: flutter --version

    - name: Install dependencies
      run: flutter pub get

    - name: Generate localization
      run: flutter gen-l10n

    - name: Generate icons
      run: dart run flutter_launcher_icons

    - name: Generate splash
    - name: Decode Android keystore
      if: runner.os == 'Linux'
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
          echo "No keystore secret set; building unsigned."
          exit 0
        fi
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/keystore.jks

    - name: Create key.properties
      if: runner.os == 'Linux'
      env:
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        mkdir -p android
        cat > android/key.properties <<EOF
        storePassword=${ANDROID_KEYSTORE_PASSWORD}
        keyPassword=${ANDROID_KEY_PASSWORD}
        keyAlias=${ANDROID_KEY_ALIAS}
        storeFile=keystore.jks
        EOF

    - name: Patch Gradle signing config (if needed)
      if: runner.os == 'Linux'
      run: |
        FILE=android/app/build.gradle
        if [ -f "$FILE" ]; then
          echo "build.gradle exists; ensure it reads key.properties."
        else
          echo "Note: android/app/build.gradle not found in repo. Make sure to run 'flutter create .' locally and commit android/ios folders for CI builds."
        fi

      run: dart run flutter_native_splash:create

    - name: Analyze
      run: flutter analyze

    - name: Set up CocoaPods
      run: |
        sudo gem install cocoapods --no-document
        cd ios && pod install && cd ..
    - name: Build IPA (unsigned)
      run: flutter build ipa --no-codesign
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: funparks-ios-ipa-unsigned
        path: build/ios/ipa/*.ipa

